<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chathruka All-in-One Studio</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .section { background: #222; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #444; }
        h2 { color: #ffcc00; }
        
        /* Styles Buttons */
        .style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .play-btn { background: #27ae60; color: white; }
        .stop-btn { background: #c0392b; color: white; width: 100%; margin-top: 10px; }
        .inst-btn { background: #34495e; color: white; margin: 5px; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Chathruka Ultimate Studio</h1>

    <div class="section">
        <h2>Rhythm Styles (ස්ටයිල් ටික ප්ලේ කරලා බලන්න)</h2>
        <div class="style-grid">
            <button class="btn play-btn" onclick="startStyle('baila')">Baila Style (6/8)</button>
            <button class="btn play-btn" onclick="startStyle('pop')">90s Pop Style</button>
            <button class="btn play-btn" onclick="startStyle('classical')">Classical (Tabla)</button>
            <button class="btn play-btn" onclick="startStyle('fast')">Fast Beat</button>
        </div>
        <button class="btn stop-btn" onclick="stopStyle()">Stop All Music</button>
    </div>

    <div class="section">
        <h2>Instruments (වාදනය කරන්න)</h2>
        <button class="btn inst-btn" onclick="playNote(261)">Piano C</button>
        <button class="btn inst-btn" onclick="playNote(293)">Piano D</button>
        <button class="btn inst-btn" onclick="playDrum(60, 0.2)">Bass Drum</button>
        <button class="btn inst-btn" onclick="playDrum(200, 0.1)">Snare</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let loopInterval;

        function playNote(freq) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        function playDrum(freq, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startStyle(style) {
            stopStyle();
            let beat = 0;
            const tempo = style === 'fast' ? 200 : 400; // වේගය පාලනය

            loopInterval = setInterval(() => {
                if (style === 'baila') {
                    // බයිලා රිදම් එක (6/8)
                    if (beat % 3 === 0) playDrum(60, 0.3); // Bass
                    else playDrum(150, 0.1); // Snare
                } else if (style === 'pop') {
                    // 90s Pop රිදම් එක
                    if (beat % 4 === 0) playDrum(70, 0.4);
                    if (beat % 4 === 2) playDrum(120, 0.2);
                } else if (style === 'classical') {
                    // තබ්ලා ස්ටයිල් එක
                    if (beat % 4 === 0) playDrum(80, 0.5); // Bayan
                    if (beat % 2 === 1) playDrum(200, 0.2); // Dayan
                }
                beat++;
            }, tempo);
        }

        function stopStyle() {
            clearInterval(loopInterval);
        }
    </script>
</body>
</html>
