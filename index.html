
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chathruka Music Studio</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        
        /* Guitar Styling */
        .guitar-body { background: #5d2e0a; width: 300px; padding: 15px; border-radius: 30px; border: 4px solid #3d1f07; }
        .string { background: #c0c0c0; height: 150px; width: 6px; margin: 5px; display: inline-block; border-radius: 3px; cursor: pointer; }
        .string:active { background: #ffcc00; }

        /* Tabla Styling */
        .tabla-container { display: flex; gap: 20px; margin-top: 20px; }
        .tabla { width: 120px; height: 120px; border-radius: 50%; border: 8px solid #444; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.1s; }
        .dayan { background: #f5f5dc; color: black; border-color: #8b4513; } /* දයා */
        .bayan { background: #333; color: white; border-color: #555; } /* බයා */
        .tabla:active { transform: scale(0.9); box-shadow: 0 0 20px #ffcc00; }
    </style>
</head>
<body>

    <h1>Chathruka Music Studio</h1>

    <div class="container">
        <div class="guitar-body">
            <h3>Guitar</h3>
            <div class="string" onclick="playSound(82.41, 'sawtooth', 1.5)"></div>
            <div class="string" onclick="playSound(110.00, 'sawtooth', 1.5)"></div>
            <div class="string" onclick="playSound(146.83, 'sawtooth', 1.5)"></div>
            <div class="string" onclick="playSound(196.00, 'sawtooth', 1.5)"></div>
            <div class="string" onclick="playSound(246.94, 'sawtooth', 1.5)"></div>
            <div class="string" onclick="playSound(329.63, 'sawtooth', 1.5)"></div>
        </div>

        <h3>Tabla</h3>
        <div class="tabla-container">
            <div class="tabla dayan" onclick="playSound(200, 'sine', 0.3)">දයා (Dayan)</div>
            <div class="tabla bayan" onclick="playSound(80, 'sine', 0.5)">බයා (Bayan)</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, type, duration) {
            // බ්‍රවුසර් එකේ ඕඩියෝ පණ ගැන්වීම
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
    </script>
</body>
</html>
